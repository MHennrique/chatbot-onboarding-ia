<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>{{ doc.filename }} | Zortea IA</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body style="background: #f4f7f6; padding: 40px;">
    <div style="max-width: 800px; margin: 0 auto; background: white; padding: 50px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
        <a href="{{ url_for('index') }}" style="color: #2D723B; text-decoration: none; font-weight: bold;">← Voltar para o Guia Zortea</a>
        
        <h1 style="font-family: 'Merriweather', serif; color: #0a1f14; margin-top: 30px;">{{ doc.filename }}</h1>
        <p style="color: #666;">Setor: <strong>{{ doc.sector }}</strong> | Enviado em: {{ doc.uploaded_at.strftime('%d/%m/%Y') }}</p>
        
        <hr style="border: 0; border-top: 1px solid #eee; margin: 30px 0;">
        
        <div style="line-height: 1.8; color: #333;">
            <p>O documento está disponível para visualização e foi processado pela nossa IA.</p>
            <embed src="/{{ doc.filepath }}" type="application/pdf" width="100%" height="600px" />
        </div>
    </div>
</body>
</html>
