<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Processos | {{ company.name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .admin-grid { display: grid; grid-template-columns: 250px 1fr; min-height: 100vh; }
        .admin-sidebar { background: #2c3e50; color: white; padding: 20px; }
        .admin-main { padding: 40px; background: #f4f7f6; }
        .sidebar-nav { list-style: none; padding: 0; margin-top: 20px; }
        .sidebar-nav a { color: #ecf0f1; text-decoration: none; display: block; padding: 10px; border-radius: 4px; transition: 0.3s; }
        .sidebar-nav a:hover, .sidebar-nav a.active { background: #34495e; }
        
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .sector-selector { margin-bottom: 30px; }
        select { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #ddd; font-size: 1rem; }
        
        .upload-area { 
            border: 2px dashed #bdc3c7; 
            padding: 50px; 
            text-align: center; 
            border-radius: 10px; 
            background: #fafafa;
            transition: 0.3s;
            cursor: not-allowed;
            opacity: 0.4;
            pointer-events: none; /* Bloqueia cliques */
        }
        .upload-area.active { 
            border-color: #2D723B; 
            background: #f0fff4; 
            opacity: 1; 
            cursor: pointer;
            pointer-events: auto; /* Habilita cliques */
        }
    </style>
</head>
<body>
    <div class="admin-grid">
        <aside class="admin-sidebar">
            <h2 class="merriweather">Zortea IA Solutions</h2>
            <nav>
                <ul class="sidebar-nav">
                    <li><a href="{{ url_for('admin_panel') }}">👥 Usuários</a></li>
                    <li><a href="{{ url_for('admin_processos') }}" class="active">📂 Processos</a></li>
                    <li><a href="{{ url_for('index') }}">💬 Chat</a></li>
                    <li style="margin-top: 30px;"><a href="{{ url_for('logout') }}" style="color: #ff7675;">🚪 Sair</a></li>
                </ul>
            </nav>
        </aside>

        <main class="admin-main">
            <div class="card">
                <h2 class="merriweather">Organização de Processos</h2>
                <p>Selecione um setor para habilitar o carregamento de documentos.</p>

                <div class="sector-selector">
                    <label><strong>Setor de Destino:</strong></label>
                    <select id="sector-select" onchange="updateUI()">
                        <option value="">-- Selecione o setor --</option>
                        {% for setor in setores %}
                        <option value="{{ setor }}">{{ setor }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div id="drop-zone" class="upload-area">
                    <div id="instruction-text">
                        <p style="font-size: 1.2rem; color: #7f8c8d;">⚠️ Selecione um setor acima primeiro</p>
                    </div>
                    <div id="active-content" style="display: none;">
                        <p style="color: #2D723B; font-weight: bold;">Setor <span id="selected-sector-name"></span> selecionado!</p>
                        <p>Arraste ficheiros PDF aqui ou clique para selecionar.</p>
                        <input type="file" id="file-input" multiple style="display: none;">
                        <button onclick="document.getElementById('file-input').click()" style="background: #2D723B; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px;">Selecionar Ficheiros</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        function updateUI() {
            const select = document.getElementById('sector-select');
            const dropZone = document.getElementById('drop-zone');
            const instruction = document.getElementById('instruction-text');
            const active = document.getElementById('active-content');
            const sectorNameSpan = document.getElementById('selected-sector-name');

            if (select.value !== "") {
                dropZone.classList.add('active');
                instruction.style.display = 'none';
                active.style.display = 'block';
                sectorNameSpan.innerText = select.value;
            } else {
                dropZone.classList.remove('active');
                instruction.style.display = 'block';
                active.style.display = 'none';
            }
        }
    </script>
</body>
</html>
